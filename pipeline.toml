[api]
base_url = "http://127.0.0.1:25503/v3"
concurrency = 4
timeout_default = 60.0
timeout_large = 300.0
large_symbols = ["SPY", "QQQ", "IWM"]

[dates]
start_date = "2021-01-01"
end_date = "2026-03-19"
